set_pump_speed:
  name: Set Pump Speed
  description: Set an Arctic Spa pump to a specific speed (e.g. low for pump 1).
  fields:
    pump_id:
      name: Pump ID
      description: The pump number (1, 2, or 3).
      required: true
      selector:
        number:
          min: 1
          max: 3
          mode: box
    speed:
      name: Speed
      description: The pump speed (on, low, or off).
      required: true
      selector:
        select:
          options:
            - "on"
            - "low"
            - "off"
