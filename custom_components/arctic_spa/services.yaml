set_pump_speed:
  name: Set Pump Speed
  description: Set an Arctic Spa pump to a specific speed.
  fields:
    pump_id:
      name: Pump ID
      description: The pump number (1-5).
      required: true
      selector:
        number:
          min: 1
          max: 5
          mode: box
    speed:
      name: Speed
      description: The pump speed (on, low, high, or off).
      required: true
      selector:
        select:
          options:
            - "on"
            - "low"
            - "high"
            - "off"
